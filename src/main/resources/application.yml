server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: springaichat
  
  # 数据源配置（生产环境请通过环境变量配置）
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_chat_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        'format_sql': true
  
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
  
  # Spring AI 配置（阿里云百炼）
  ai:
    openai:
      # 重要：请设置环境变量 ALIYUN_API_KEY 或直接在这里填写真实的 API Key
      api-key: ${ALIYUN_API_KEY:sk-your-api-key-here}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen-turbo
          temperature: 0.7
          max-tokens: 2048

# JWT配置
jwt:
  # 重要：生产环境请替换为强随机密钥（至少32字符）
  secret: ${JWT_SECRET:your-production-secret-key-must-be-at-least-32-characters-long}
  expiration: 86400000

# 聊天配置
chat:
  # 最大历史消息数
  max-history-size: 20
  # 最大消息长度（字符）
  max-message-length: 4000
  # 缓存过期时间（小时）
  cache-expire-hours: 24

# 日志配置
logging:
  level:
    root: INFO
    'com.example.springaichat': DEBUG
    'org.springframework.security': INFO
    'org.hibernate.SQL': WARN
    'org.springframework.ai': DEBUG
